services:
  gateway:
    image: nginx:latest
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - trips-service
      - users-service
      - drivers-service
      - realtime-service
      - catalog-service
    networks:
      - domi-net

  auth-service:
    build: ./docker/php
    container_name: auth-service
    volumes:
      - ./services/auth-service:/var/www
    working_dir: /var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - auth-db
      - redis
    networks:
      - domi-net

  trips-service:
    build: ./docker/php
    container_name: trips-service
    volumes:
      - ./services/trips-service:/var/www
    working_dir: /var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - trips-db
      - redis
      - rabbitmq
      - auth-service
      - drivers-service
      - realtime-service
    networks:
      - domi-net

  users-service:
    build: ./docker/php
    container_name: users-service
    volumes:
      - ./services/users-service:/var/www
    working_dir: /var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - users-db
      - redis
      - auth-service
    networks:
      - domi-net

  drivers-service:
    build: ./docker/php
    container_name: drivers-service
    volumes:
      - ./services/drivers-service:/var/www
    working_dir: /var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - drivers-db
      - redis
      - auth-service
      - realtime-service
    networks:
      - domi-net

  catalog-service:
    build: ./docker/php
    container_name: catalog-service
    volumes:
      - ./services/catalog-service:/var/www
    working_dir: /var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - catalog-db
      - redis
    networks:
      - domi-net

  realtime-service:
    build: ./docker/php
    container_name: realtime-service
    volumes:
      - ./services/realtime-service:/var/www
    working_dir: /var/www
    # Inline para evitar CRLF en .sh en Windows. Bash existe en la imagen Debian.
    command: ["bash", "-c", "([ -f vendor/autoload.php ] || composer install --no-interaction --prefer-dist) && php artisan serve --host=0.0.0.0 --port=8000 & exec php artisan reverb:start"]
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - domi-net

  auth-db:
    image: mysql:8
    container_name: auth-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    volumes:
      - auth-db-data:/var/lib/mysql
    networks:
      - domi-net

  trips-db:
    image: mysql:8
    container_name: trips-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: trips_db
    ports:
      - "3308:3306"
    volumes:
      - trips-db-data:/var/lib/mysql
    networks:
      - domi-net

  users-db:
    image: mysql:8
    container_name: users-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    ports:
      - "3309:3306"
    volumes:
      - users-db-data:/var/lib/mysql
    networks:
      - domi-net

  drivers-db:
    image: mysql:8
    container_name: drivers-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: drivers_db
    ports:
      - "3310:3306"
    volumes:
      - drivers-db-data:/var/lib/mysql
    networks:
      - domi-net

  catalog-db:
    image: mysql:8
    container_name: catalog-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catalog_db
    ports:
      - "3311:3306"
    volumes:
      - catalog-db-data:/var/lib/mysql
    networks:
      - domi-net

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - domi-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - domi-net

networks:
  domi-net:
    driver: bridge

volumes:
  auth-db-data:
  trips-db-data:
  users-db-data:
  drivers-db-data:
  catalog-db-data:
