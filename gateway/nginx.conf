events {
    worker_connections 1024;
}

http {
    upstream auth-service {
        server auth-service:8000;
    }

    upstream trips-service {
        server trips-service:8000;
    }

    upstream users-service {
        server users-service:8000;
    }

    upstream drivers-service {
        server drivers-service:8000;
    }

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 20M;

        # Auth Service
        location /auth {
            rewrite ^/auth/?(.*)$ /$1 break;
            proxy_pass http://auth-service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Trips Service
        location /trips {
            rewrite ^/trips/?(.*)$ /$1 break;
            proxy_pass http://trips-service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Users Service
        location /users {
            rewrite ^/users/?(.*)$ /$1 break;
            proxy_pass http://users-service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Drivers Service
        location /drivers {
            rewrite ^/drivers/?(.*)$ /$1 break;
            proxy_pass http://drivers-service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 404;
        }
    }
}
